# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/dentalclinic
spring.datasource.username=dentalclinic
spring.datasource.password=dentalclinic_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate verifica el schema (Flyway gestiona el DDL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── OAuth2 / Keycloak ────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/dentalclinic
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/dentalclinic/protocol/openid-connect/certs

# ── CORS (React dev server) ──────────────────────────────────────────────────
spring.mvc.cors.allowed-origins=http://localhost:5173

# ── Email / MailHog (desarrollo) ─────────────────────────────────────────────
# Para desarrollo usa MailHog: docker run -p 1025:1025 -p 8025:8025 mailhog/mailhog
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Notificaciones de dominio ─────────────────────────────────────────────────
app.notifications.enabled=true
app.notifications.from=noreply@dentalclinic.com
app.notifications.admin=admin@dentalclinic.com

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Dental Clinic API
info.app.version=1.0.0

# ── Caché (Caffeine) ──────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# ── Spring Modulith ───────────────────────────────────────────────────────────
spring.modulith.detection-strategy=direct-sub-packages

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=2s

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=dentalclinic
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.dentalclinic.*

# Kafka topics
app.kafka.topics.patient=dental.patient.events
app.kafka.topics.scheduling=dental.scheduling.events
app.kafka.topics.clinical=dental.clinical.events
app.kafka.topics.treatment=dental.treatment.events
app.kafka.topics.billing=dental.billing.events

# Default clinic ID (demo / single-tenant)
app.clinic.default-id=00000000-0000-0000-0000-000000000001
